<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PMB UNILAM - Login Mahasiswa</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
  </head>
  <body
    class="bg-gradient-to-br from-white to-blue-500 min-h-screen flex items-center justify-center p-4 sm:p-6 md:p-8"
  >
    <div
      class="bg-white w-full max-w-sm sm:max-w-md p-6 sm:p-8 rounded-2xl shadow-2xl transition-all duration-300"
    >
      <div class="text-center mb-6 sm:mb-8">
        <h1
          class="text-2xl sm:text-3xl font-black text-slate-900 tracking-wider underline"
        >
          PMB UNILAM
        </h1>
        <p class="text-xs sm:text-sm font-semibold text-gray-500 mt-1 sm:mt-2">
          Login Mentor
        </p>
      </div>

      <form class="space-y-4 sm:space-y-5">
        <div>
          <label
            for="username"
            class="block text-xs sm:text-sm font-semibold text-gray-700 mb-1.5 sm:mb-2"
            >Username</label
          >
          <div class="relative">
            <div
              class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-gray-400"
            >
              <i data-lucide="user" class="w-4 h-4 sm:w-5 sm:h-5"></i>
            </div>
            <input
              type="text"
              id="username"
              required
              placeholder="Masukkan username Anda"
              class="w-full pl-10 sm:pl-11 pr-4 py-2.5 sm:py-3 border border-gray-300 rounded-xl text-xs sm:text-sm focus:outline-none focus:border-indigo-500 focus:ring-4 focus:ring-indigo-100 transition duration-200"
            />
          </div>
        </div>

        <div>
          <label
            for="password"
            class="block text-xs sm:text-sm font-semibold text-gray-700 mb-1.5 sm:mb-2"
            >Password</label
          >
          <div class="relative">
            <div
              class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-gray-400"
            >
              <i data-lucide="lock" class="w-4 h-4 sm:w-5 sm:h-5"></i>
            </div>

            <input
              type="password"
              id="password"
              required
              placeholder="Masukkan password Anda"
              class="w-full pl-10 sm:pl-11 pr-10 sm:pr-12 py-2.5 sm:py-3 border border-gray-300 rounded-xl text-xs sm:text-sm focus:outline-none focus:border-indigo-500 focus:ring-4 focus:ring-indigo-100 transition duration-200"
            />

            <button
              type="button"
              id="togglePassword"
              class="absolute inset-y-0 right-0 pr-3 flex items-center text-gray-400 hover:text-indigo-600 transition duration-200"
            >
              <i
                id="eyeIcon"
                data-lucide="eye"
                class="w-4 h-4 sm:w-5 sm:h-5"
              ></i>
            </button>
          </div>
        </div>

        <div
          class="flex items-center justify-between text-[11px] sm:text-sm pt-1"
        >
          <label
            class="flex items-center space-x-1.5 sm:space-x-2 text-gray-600 cursor-pointer select-none"
          >
            <input
              type="checkbox"
              class="w-3.5 h-3.5 sm:w-4 sm:h-4 text-indigo-600 border-gray-300 rounded focus:ring-indigo-500"
            />
            <span>Ingat Saya</span>
          </label>
          <a
            href="#"
            class="font-medium text-blue-600 hover:text-blue-500 hover:underline"
            >Lupa Password?</a
          >
        </div>

        <button
          type="submit"
          class="w-full py-2.5 sm:py-3 bg-blue-600 hover:bg-blue-800 active:scale-[0.98] text-white font-bold rounded-xl text-sm sm:text-base shadow-lg shadow-indigo-200 transition duration-200 flex items-center justify-center space-x-2 mt-2"
        >
          <span>Sign In</span>
          <i data-lucide="log-in" class="w-4 h-4 sm:w-5 sm:h-5"></i>
        </button>
      </form>

      <div
        class="text-center mt-6 sm:mt-8 pt-4 sm:pt-6 border-t border-gray-100"
      >
        <p class="text-xs sm:text-sm text-gray-500">
          Belum punya akun?
          <a
            href="#"
            class="font-bold text-blue-600 hover:text-blue-500 hover:underline"
            >Sign Up</a
          >
        </p>
      </div>
    </div>

    <script>
      // Inisialisasi awal icon Lucide
      lucide.createIcons();

      // Logika Show / Hide Password
      const passwordInput = document.getElementById("password");
      const togglePasswordBtn = document.getElementById("togglePassword");
      const eyeIcon = document.getElementById("eyeIcon");

      togglePasswordBtn.addEventListener("click", function () {
        const isPassword = passwordInput.getAttribute("type") === "password";
        passwordInput.setAttribute("type", isPassword ? "text" : "password");
        eyeIcon.setAttribute("data-lucide", isPassword ? "eye-off" : "eye");
        lucide.createIcons();
      });
    </script>
  </body>
</html>
