<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard - Profil Pengguna</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome untuk Icon -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <style>
      /* Kustomisasi scrollbar halus untuk area form */
      ::-webkit-scrollbar {
        width: 6px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: rgba(99, 102, 241, 0.3);
        border-radius: 10px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: rgba(99, 102, 241, 0.5);
      }
    </style>
  </head>
  <body
    class="text-slate-800 font-sans min-h-screen pb-24 md:pb-6 relative flex items-center justify-center overflow-x-hidden"
  >
    <!-- BACKGROUND UTAMA: Menggunakan foto gedung UNILAM dengan Opacity & Blur -->
    <div
      class="fixed inset-0 bg-cover bg-center z-0 scale-105"
      style="
        background-image: url(&quot;https://images.prodia.co.id/2026/unilam-building.jpeg&quot;);
        background-image: url(&quot;https://upload.wikimedia.org/wikipedia/commons/thumb/c/ca/Generic_Placeholder_Image.png/800px-Generic_Placeholder_Image.png&quot;); /* Cadangan visual jika link gambar lokal dari attachment berubah */
        background-image: url(&quot;https://images.unsplash.com/photo-1541339907198-e08756dedf3f?auto=format&fit=crop&w=1920&q=80&quot;); /* Gunakan URL gambar gedung UNILAM kamu di bawah ini */
      "
    >
      <div
        class="absolute inset-0 bg-gradient-to-br from-indigo-950/80 via-slate-900/85 to-emerald-950/70 backdrop-blur-[6px]"
      ></div>
    </div>

    <!-- KONTEN UTAMA (Berada di atas Background) -->
    <div class="w-full max-w-6xl mx-auto p-4 md:p-8 relative z-10">
      <!-- Header Dashboard Elegan -->
      <div class="mb-8 text-center md:text-left">
        <h1
          class="text-3xl font-extrabold text-white tracking-tight drop-shadow-md"
        >
          <i class="fa-solid fa-user-gear mr-2 text-indigo-400"></i>Pengaturan
          Akun
        </h1>
        <p class="text-sm text-slate-300 mt-1 font-medium drop-shadow-sm">
          Kelola informasi profil, NPM, dan pembaruan data mahasiswa Universitas
          La Tansa Mashiro.
        </p>
      </div>

      <!-- Grid Layout Utama (Responsif) -->
      <div class="grid grid-cols-1 lg:grid-cols-3 gap-8 items-start">
        <!-- KOLOM KIRI: Card Upload Foto (Di-opacity-kan menjadi bg-white/70 agar lebih menyatu dengan background) -->
        <div
          class="lg:col-span-1 bg-white/70 backdrop-blur-xl rounded-3xl shadow-2xl border border-white/30 p-8 flex flex-col items-center justify-center text-center transform transition duration-300 hover:shadow-indigo-500/10"
        >
          <!-- Wrapper Foto Profil Tanpa Ring, Menggunakan Soft Blurred Shadow -->
          <div class="relative group w-40 h-40 mb-5">
            <div
              class="w-full h-full rounded-full overflow-hidden shadow-[0_10px_25px_rgba(0,0,0,0.3),0_0_20px_rgba(99,102,241,0.2)] bg-slate-200 transition duration-300 group-hover:scale-102"
            >
              <img
                id="avatarPreview"
                src="https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?auto=format&fit=crop&w=250&q=80"
                alt="Foto Profil"
                class="w-full h-full object-cover"
              />
            </div>

            <!-- Tombol Kamera Mengambang -->
            <label
              for="avatarUpload"
              class="absolute bottom-1 right-1 bg-indigo-600 hover:bg-indigo-700 text-white w-11 h-11 rounded-full flex items-center justify-center cursor-pointer shadow-lg transition-all duration-200 hover:scale-110 active:scale-95 shadow-indigo-300"
            >
              <i class="fa-solid fa-camera text-base"></i>
              <input
                type="file"
                id="avatarUpload"
                accept="image/*"
                class="hidden"
              />
            </label>
          </div>

          <!-- Informasi Pengguna Aktif -->
          <h2
            id="summaryName"
            class="text-2xl font-bold text-slate-900 tracking-tight"
          >
            Salman Alfarisi
          </h2>
          <p
            id="summaryRole"
            class="text-sm font-semibold text-indigo-700 bg-indigo-50/80 px-4 py-1 rounded-full mt-2 inline-block border border-indigo-100"
          >
            Mahasiswa Informatika
          </p>

          <div class="w-full border-t border-slate-300/40 my-6"></div>

          <!-- Petunjuk Upload Dokumen -->
          <p
            class="text-xs text-slate-600 leading-relaxed bg-white/50 p-4 rounded-2xl border border-dashed border-slate-300/60 w-full"
          >
            <i class="fa-solid fa-circle-info text-indigo-600 mr-1.5"></i>
            Mendukung format <b>JPG, PNG, atau WEBP</b> dengan ukuran file
            maksimal 2MB.
          </p>
        </div>

        <!-- KOLOM KANAN: Card Utama Form Detail Profil (Di-opacity-kan menjadi bg-white/75 agar lebih menyatu dengan background) -->
        <div
          class="lg:col-span-2 bg-white/75 backdrop-blur-xl rounded-3xl shadow-2xl border border-white/30 overflow-hidden transform transition duration-300"
        >
          <!-- Header Card Form -->
          <div
            class="border-b border-slate-200/50 px-8 py-5 bg-gradient-to-r from-white/40 to-white/10 flex items-center space-x-3"
          >
            <div class="w-3 h-3 rounded-full bg-indigo-500"></div>
            <h3 class="font-bold text-slate-800 tracking-wide text-base">
              Detail Informasi Pribadi
            </h3>
          </div>

          <!-- Formulir Isian Data -->
          <form id="profileForm" class="p-8 space-y-6">
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-6">
              <!-- Input: Nama Lengkap -->
              <div class="sm:col-span-2">
                <label
                  class="block text-xs font-bold uppercase tracking-wider text-slate-500 mb-2"
                  >Nama Lengkap</label
                >
                <div class="relative">
                  <span
                    class="absolute inset-y-0 left-0 flex items-center pl-4 text-slate-400"
                  >
                    <i class="fa-solid fa-id-card"></i>
                  </span>
                  <input
                    type="text"
                    id="inputName"
                    value="Salman Alfarisi"
                    class="w-full pl-11 pr-4 py-3 rounded-xl border border-slate-300/60 bg-white/60 focus:outline-none focus:border-indigo-500 focus:bg-white focus:ring-4 focus:ring-indigo-100 transition duration-200 text-sm font-medium shadow-inner"
                  />
                </div>
              </div>

              <!-- Input: NPM -->
              <div>
                <label
                  class="block text-xs font-bold uppercase tracking-wider text-slate-500 mb-2"
                  >Nomor Identitas / NPM</label
                >
                <div class="relative">
                  <span
                    class="absolute inset-y-0 left-0 flex items-center pl-4 text-slate-400"
                  >
                    <i class="fa-solid fa-graduation-cap"></i>
                  </span>
                  <input
                    type="text"
                    id="inputNPM"
                    value="525241019"
                    placeholder="Masukkan NPM Anda"
                    class="w-full pl-11 pr-4 py-3 rounded-xl border border-slate-300/60 bg-white/60 focus:outline-none focus:border-indigo-500 focus:bg-white focus:ring-4 focus:ring-indigo-100 transition duration-200 text-sm font-medium shadow-inner"
                  />
                </div>
              </div>

              <!-- Input: Email -->
              <div>
                <label
                  class="block text-xs font-bold uppercase tracking-wider text-slate-500 mb-2"
                  >Alamat Email</label
                >
                <div class="relative">
                  <span
                    class="absolute inset-y-0 left-0 flex items-center pl-4 text-slate-400"
                  >
                    <i class="fa-solid fa-envelope"></i>
                  </span>
                  <input
                    type="email"
                    value="salman@example.com"
                    class="w-full pl-11 pr-4 py-3 rounded-xl border border-slate-300/60 bg-white/60 focus:outline-none focus:border-indigo-500 focus:bg-white focus:ring-4 focus:ring-indigo-100 transition duration-200 text-sm font-medium shadow-inner"
                  />
                </div>
              </div>

              <!-- Input: Program Studi -->
              <div>
                <label
                  class="block text-xs font-bold uppercase tracking-wider text-slate-500 mb-2"
                  >Pekerjaan / Program Studi</label
                >
                <div class="relative">
                  <span
                    class="absolute inset-y-0 left-0 flex items-center pl-4 text-slate-400"
                  >
                    <i class="fa-solid fa-briefcase"></i>
                  </span>
                  <input
                    type="text"
                    id="inputRole"
                    value="Teknik Informatika"
                    class="w-full pl-11 pr-4 py-3 rounded-xl border border-slate-300/60 bg-white/60 focus:outline-none focus:border-indigo-500 focus:bg-white focus:ring-4 focus:ring-indigo-100 transition duration-200 text-sm font-medium shadow-inner"
                  />
                </div>
              </div>

              <!-- Input: Nomor Telepon -->
              <div>
                <label
                  class="block text-xs font-bold uppercase tracking-wider text-slate-500 mb-2"
                  >Nomor Telepon</label
                >
                <div class="relative">
                  <span
                    class="absolute inset-y-0 left-0 flex items-center pl-4 text-slate-400"
                  >
                    <i class="fa-solid fa-phone"></i>
                  </span>
                  <input
                    type="tel"
                    value="081234567890"
                    class="w-full pl-11 pr-4 py-3 rounded-xl border border-slate-300/60 bg-white/60 focus:outline-none focus:border-indigo-500 focus:bg-white focus:ring-4 focus:ring-indigo-100 transition duration-200 text-sm font-medium shadow-inner"
                  />
                </div>
              </div>

              <!-- Input: Biografi -->
              <div class="sm:col-span-2">
                <label
                  class="block text-xs font-bold uppercase tracking-wider text-slate-500 mb-2"
                  >Biografi Singkat</label
                >
                <textarea
                  rows="3"
                  class="w-full px-4 py-3 rounded-xl border border-slate-300/60 bg-white/60 focus:outline-none focus:border-indigo-500 focus:bg-white focus:ring-4 focus:ring-indigo-100 transition duration-200 text-sm font-medium resize-none shadow-inner"
                  placeholder="Ceritakan sedikit tentang latar belakang akademis Anda..."
                ></textarea>
              </div>
            </div>

            <!-- Tombol Aksi Batal / Simpan -->
            <div
              class="flex items-center justify-end space-x-4 pt-5 border-t border-slate-200/50"
            >
              <button
                type="button"
                onclick="window.history.back()"
                class="px-6 py-3 rounded-xl text-sm font-semibold text-slate-600 hover:bg-white/40 hover:text-slate-800 transition duration-150 active:scale-98"
              >
                Batal
              </button>
              <button
                type="submit"
                class="px-7 py-3 rounded-xl text-sm font-bold text-white bg-gradient-to-r from-indigo-600 to-indigo-700 hover:from-indigo-700 hover:to-indigo-800 shadow-lg shadow-indigo-300/30 hover:shadow-xl transition duration-200 transform active:scale-98"
              >
                Simpan Perubahan
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>

    <!-- NAVIGATION BAR BOTTOM -->
    <div
      class="md:hidden fixed bottom-0 left-0 right-0 bg-white/80 backdrop-blur-xl border-t border-white/20 shadow-[0_-8px_30px_rgb(0,0,0,0.1)] px-6 py-2.5 z-50 rounded-t-3xl"
    >
      <div class="flex justify-between items-center max-w-md mx-auto">
        <!-- Menu: Beranda -->
        <a
          href="dashboard_mahasiswa.html"
          class="flex flex-col items-center justify-center text-slate-400 hover:text-indigo-600 transition duration-150"
        >
          <i class="fa-solid fa-house text-xl"></i>
          <span class="text-[10px] mt-1 font-semibold">Beranda</span>
        </a>

        <!-- Menu: Profil (Aktif) -->
        <a
          href="profil_mahasiswa.html"
          class="flex flex-col items-center justify-center text-indigo-600 transition duration-150"
        >
          <div class="relative flex flex-col items-center justify-center">
            <i class="fa-solid fa-user text-xl"></i>
            <span class="text-[10px] mt-1 font-bold">Profil</span>
            <div
              class="absolute -bottom-2 w-5 h-1 bg-indigo-600 rounded-full"
            ></div>
          </div>
        </a>

        <!-- Menu: Tentang -->
        <a
          href="sejarah.html"
          class="flex flex-col items-center justify-center text-slate-400 hover:text-indigo-600 transition duration-150"
        >
          <i class="fa-solid fa-circle-info text-xl"></i>
          <span class="text-[10px] mt-1 font-semibold">Tentang</span>
        </a>

        <!-- Menu: Logout -->
        <a
          href="javascript:void(0);"
          onclick="handleLogout()"
          class="flex flex-col items-center justify-center text-slate-400 hover:text-rose-600 transition duration-150"
        >
          <i class="fa-solid fa-right-from-bracket text-xl"></i>
          <span class="text-[10px] mt-1 font-semibold">Logout</span>
        </a>
      </div>
    </div>

    <!-- CODE SCRIPT LOGIC JAVASCRIPT -->
    <script>
      const avatarUpload = document.getElementById("avatarUpload");
      const avatarPreview = document.getElementById("avatarPreview");
      const inputName = document.getElementById("inputName");
      const summaryName = document.getElementById("summaryName");
      const inputRole = document.getElementById("inputRole");
      const summaryRole = document.getElementById("summaryRole");
      const profileForm = document.getElementById("profileForm");

      // 1. Sinkronisasi Real-Time Preview Gambar Profil
      avatarUpload.addEventListener("change", function () {
        const file = this.files[0];
        if (file) {
          const reader = new FileReader();
          reader.onload = function (e) {
            avatarPreview.setAttribute("src", e.target.result);
          };
          reader.readAsDataURL(file);
        }
      });

      // 2. Real-Time Sinkronisasi Input Data ke Card Kiri
      inputName.addEventListener("input", function () {
        summaryName.textContent = this.value || "Nama Pengguna";
      });

      inputRole.addEventListener("input", function () {
        summaryRole.textContent = this.value || "Pekerjaan";
      });

      // Nilai Default saat Awal Muat Layar
      summaryName.textContent = inputName.value;
      summaryRole.textContent = inputRole.value;

      // 3. Aksi Simpan Perubahan & Pengalihan Halaman (Redirect)
      profileForm.addEventListener("submit", function (e) {
        e.preventDefault();
        alert("Profil Anda berhasil diperbarui!");
        window.location.href = "index.html";
      });

      // 4. Konfirmasi dan Pengalihan Keluar (Logout)
      function handleLogout() {
        const konfirmasi = confirm(
          "Apakah Anda yakin ingin keluar dari aplikasi?",
        );
        if (konfirmasi) {
          window.location.href = "home_page.html";
        }
      }
    </script>
  </body>
</html>
