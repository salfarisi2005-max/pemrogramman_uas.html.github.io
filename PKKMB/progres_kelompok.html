<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard Progres Mahasiswa</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-slate-50 min-h-screen p-4 md:p-8">
    <div class="max-w-6xl mx-auto">
      <h1 class="text-2xl font-bold text-slate-800 mb-6">
        Data Progres & Poin Kelompok
      </h1>

      <div
        class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden"
      >
        <div
          class="hidden md:flex items-center bg-slate-50 p-4 border-b border-slate-200 text-xs font-bold text-slate-500 uppercase"
        >
          <div class="w-16 text-center">No</div>
          <div class="w-1/3 px-4">Nama Mahasiswa</div>
          <div class="w-1/4 px-4">NIM</div>
          <div class="flex-1 px-4">Progres</div>
          <div class="w-24 px-4 text-center">Poin</div>
        </div>

        <div class="divide-y divide-slate-100">
          <div id="data-container"></div>
        </div>
      </div>
    </div>

    <script>
      const students = [
        { name: "Andi Saputra", nim: "1122334401", progress: 85, points: 950 },
        {
          name: "Budi Santoso",
          nim: "1122334402",
          progress: 100,
          points: 1200,
        },
        { name: "Citra Lestari", nim: "1122334403", progress: 45, points: 600 },
        { name: "Dimas Anggara", nim: "1122334404", progress: 70, points: 750 },
        { name: "Eka Putri", nim: "1122334405", progress: 30, points: 400 },
        {
          name: "Fajar Ramadhan",
          nim: "1122334406",
          progress: 95,
          points: 1100,
        },
        { name: "Gita Gutawa", nim: "1122334407", progress: 60, points: 650 },
        {
          name: "Hanafi Makarim",
          nim: "1122334408",
          progress: 20,
          points: 300,
        },
        { name: "Indah Permata", nim: "1122334409", progress: 55, points: 550 },
        { name: "Joko Anwar", nim: "1122334410", progress: 80, points: 880 },
        { name: "Kevin Sanjaya", nim: "1122334411", progress: 90, points: 990 },
        {
          name: "Lestari Kusuma",
          nim: "1122334412",
          progress: 40,
          points: 450,
        },
      ];

      const container = document.getElementById("data-container");
      students.forEach((s, index) => {
        const pointColor =
          s.points >= 900
            ? "text-emerald-600 bg-emerald-50"
            : s.points >= 600
              ? "text-amber-600 bg-amber-50"
              : "text-rose-600 bg-rose-50";

        container.innerHTML += `
                <div class="flex flex-col md:flex-row md:items-center px-4 py-4 hover:bg-slate-50 gap-3 md:gap-0">
                    <div class="hidden md:block w-16 text-center text-slate-400 text-sm">${index + 1}</div>
                    <div class="flex justify-between md:w-1/3 md:px-4">
                        <span class="font-bold text-slate-800">${s.name}</span>
                        <span class="md:hidden text-xs text-slate-400">NIM: ${s.nim}</span>
                    </div>
                    <div class="hidden md:block md:w-1/4 px-4 text-slate-500 text-sm">${s.nim}</div>
                    <div class="flex-1 md:px-4 flex items-center gap-3">
                        <div class="flex-1 bg-blue-100 rounded-full h-2.5">
                            <div class="bg-blue-500 h-full rounded-full" style="width: ${s.progress}%"></div>
                        </div>
                        <span class="text-sm font-bold w-10 text-right">${s.progress}%</span>
                    </div>
                    <div class="w-full md:w-24 md:px-4 flex justify-between md:justify-center items-center">
                        <span class="md:hidden text-xs text-slate-500">Total Poin:</span>
                        <span class="font-bold ${pointColor} px-3 py-1 rounded-full text-sm">${s.points}</span>
                    </div>
                </div>
            `;
      });
    </script>
  </body>
</html>
