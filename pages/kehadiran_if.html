        <h1 class="text-xl font-bold text-gray-800 tracking-wide">
          📸 MY FAVORITE GALLERY

          class="text-sm text-gray-500 font-semibold bg-gray-100 px-3 py-1 rounded-full"
        >
          Memuat foto...
        </p>
      </div>
    </header>

      <div
        id="galeri-container"
        class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6"

    </main>

      // 2. Mengambil elemen tempat galeri dan counter
      const container = document.getElementById("galeri-container");
      const counter = document.getElementById("counter-foto");

      // Update jumlah total foto di navbar
      counter.innerText = `${daftarFoto.length} Foto`;

      // 3. Fungsi untuk membuat bingkai foto secara otomatis
      daftarFoto.forEach((foto) => {
        // Buat elemen kotak bingkai (Polaroid)
        const card = document.createElement("div");
        card.className =
          "bg-white p-3 rounded-sm shadow-md hover:shadow-xl transition-all duration-300 border border-gray-200 flex flex-col justify-between";

        card.innerHTML = `
                <div>
                    <div class="aspect-square overflow-hidden bg-gray-100 rounded-sm">
                        <img src="${foto.url}" 
                             alt="${foto.judul}" 
                             loading="lazy" 
                             class="w-full h-full object-cover hover:scale-105 transition-transform duration-500">
                    </div>
                </div>
                <div class="mt-3 text-center">  
                    <p class="font-serif italic text-gray-700 text-base line-clamp-1">${foto.judul}</p>
                    <span class="text-[11px] text-gray-400 block mt-0.5">${foto.tanggal}</span>
                </div>
            `;

        // Masukkan bingkai yang sudah jadi ke dalam galeri utama
        container.appendChild(card);
      });
